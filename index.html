<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Galería de Juegos</title>
  <link rel="icon" href="https://i.imgur.com/uHrgKte.png" type="image/png"/>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 12px;
      overflow: hidden;
      text-align: center;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      height: auto;
      display: block;
    }

    .title {
      padding: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

<h1>Galería</h1>

<div class="grid" id="contenedor"></div>

<script>
const contenedor = document.getElementById("contenedor");

fetch("categorias-ttv.json"  + Date.now())
  .then(res => res.json())
  .then(data => {
    for (const titulo in data) {
      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = data[titulo];
      img.alt = titulo;
      img.loading = "lazy";

      const text = document.createElement("div");
      text.className = "title";
      text.textContent = titulo;

      card.appendChild(img);
      card.appendChild(text);

      contenedor.appendChild(card);
    }
  })
  .catch(err => console.error("Error:", err));
</script>

</body>
</html>
