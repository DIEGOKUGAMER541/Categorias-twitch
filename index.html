    }
    select {
      width: 100%;

      border: 2px solid #c800ff;
      color: #00fbff;
      border-radius: 8px;
    }
    button {
      background: #333;
      color: #00fbff;
      border: 2px solid #00fbff;
      font-weight: bold;

    .about-btn {
      position: fixed;

      background: #333;

      color: #333;
    }
    .about-panel {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #000000cc;
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: 0.3s;
    }
    .about-panel.active {
      opacity: 1;
      pointer-events: all;
    }
    .about-content {
      background: #1f1f1f;

<div class="grid" id="contenedor"></div>

<div class="about-btn" onclick="toggleAbout()">ℹ</div>
<div class="about-panel" id="aboutPanel">
  <div class="about-content">

    </div>
    <button onclick="toggleAbout()">Cerrar</button>
  </div>
</div>
<script>
const contenedor = document.getElementById("contenedor");

fetch("categorias-ttv.json")
  .then(res => res.json())
  .then(data => {
    for (const titulo in data) {
      const card = document.createElement("div");
      card.className = "card";

      const img = document.createElement("img");
      img.src = data[titulo];
      img.alt = titulo;
      img.loading = "lazy";

      const text = document.createElement("div");
      text.className = "title";
      text.textContent = titulo;
      card.appendChild(img);
      card.appendChild(text);
      contenedor.appendChild(card);
    }
  })
  .catch(err => console.error("Error:", err));

  function toggleAbout() {
  const panel = document.getElementById("aboutPanel");
  panel.classList.toggle("active");
}
</script>
